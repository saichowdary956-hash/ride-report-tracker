services:
  - type: web
    name: ride-report-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python ride_report_app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: ride-report-db
          property: connectionString
      - key: ALLOW_SQLITE_FALLBACK
        value: "1"

databases:
  - name: ride-report-db
    plan: free
    databaseName: ride_report_tracker
    postgresMajorVersion: "17"
